  - key: staggered
    label: Parkweise
    values:
      - value: 'yes'
        label: Alternierendes Parken
        description: >-
          Auf diesem Abschnitt gibt es keine Markierungen oder Schilder, die das Parken regeln. Häufig entwickelt sich eine Konvention zwischen den Anwohnenden, in welchen Bereichen auf welcher Seite geparkt wird. In der Kapazitätsberechnung fließt das ein: Die Kapazität wird um 50% reduziert (da nur eine Seite genutzt wird) und zusätzlich wird für jeden 60m-Abschnitt ein Manövrierraumverlust von 10m (≈1,9 Fahrzeugplätze) abgezogen, da beim Seitenwechsel Manövrierraum benötigt wird. Diese Angaben basieren auf Erfahrungswerten.
        chapterRefs:
          - chapterId: capacity-calculation
      - value: 'no'
        label: Nicht alternierend
  - key: length
    format: number
    label: Länge
    description: Berechnete Segmentlänge des OSM-Straßenabschnitts. Für die Berechnung wird eine für Deutschland geeignete metrische Projektion verwendet.

