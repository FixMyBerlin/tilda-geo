    label: Parkposition
    description: Lage oder Art des Parkraums im Straßenland.
    values:
      - value: lane
        label: Auf der Fahrbahn
      - value: half_on_kerb
        label: Halb auf dem Gehweg
      - value: on_kerb
        label: Ganz auf dem Gehweg
      - value: no_parking
        label: Eingeschränktes Haltverbot
      - value: no_stopping
