title: Parken
summary: Die Haupttabelle für straßenseitiges Parken in Form von Liniengeometrien. Die Geometrien sind von OpenStreetMap Straßenabschnitten sowie separat erfassten Parkflächen abgeleitet.
sourceIds: [tilda_parkings]

