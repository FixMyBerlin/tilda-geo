title: Parkraum Stanzungen
summary:
  Stanzungen sind ein Kernbestandteil der Parkraum prozessierung. Mit ihnen werden die zu Beginn der Prozessierung gröber abgeleiteten Daten präzise Parkraum-Abschnitte abgeleitet. Stanzungen können bzum Beispiel Gehwegübergänge, Kreuzungen und Hindernisse wie Bäume oder Poller sein.
  Polygon-Stanzungen entlang der Parkraum-Linien (Hindernisse, Kreuzungen, Einfahrten, ÖPNV-Haltestellen, externe eUVM-Daten).
  Die Attribute beschreiben die Stanzung, nicht die Parklinie (`parkings`).
