name: Setup Configuration
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string

jobs:
  setup_env:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify env manifest
        run: bun .github/scripts/verify-env-manifest.ts

      - name: Generate deploy .env from manifest
        env:
          INPUT_ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
          VAR_DATABASE_HOST: ${{ vars.DATABASE_HOST }}
          SECRET_DATABASE_USER: ${{ secrets.DATABASE_USER }}
          SECRET_DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SECRET_DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          VAR_PROCESS_GEOFABRIK_DOWNLOAD_URL: ${{ vars.PROCESS_GEOFABRIK_DOWNLOAD_URL }}
          SECRET_PROCESS_GEOFABRIK_OAUTH_OSM_USERNAME: ${{ secrets.PROCESS_GEOFABRIK_OAUTH_OSM_USERNAME }}
          SECRET_PROCESS_GEOFABRIK_OAUTH_OSM_PASSWORD: ${{ secrets.PROCESS_GEOFABRIK_OAUTH_OSM_PASSWORD }}
          VAR_TILES_URL: ${{ vars.TILES_URL }}
          VAR_CACHELESS_URL: ${{ vars.CACHELESS_URL }}
          VAR_VITE_APP_ORIGIN: ${{ vars.VITE_APP_ORIGIN }}
          VAR_VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          VAR_APP_URL: ${{ vars.APP_URL }}
          SECRET_SESSION_SECRET_KEY: ${{ secrets.SESSION_SECRET_KEY }}
          SECRET_OSM_CLIENT_ID: ${{ secrets.OSM_CLIENT_ID }}
          SECRET_OSM_CLIENT_SECRET: ${{ secrets.OSM_CLIENT_SECRET }}
          SECRET_S3_KEY: ${{ secrets.S3_KEY }}
          SECRET_S3_SECRET: ${{ secrets.S3_SECRET }}
          SECRET_S3_REGION: ${{ secrets.S3_REGION }}
          SECRET_S3_BUCKET: ${{ secrets.S3_BUCKET }}
          SECRET_ATLAS_API_KEY: ${{ secrets.ATLAS_API_KEY }}
          SECRET_MAPROULETTE_API_KEY: ${{ secrets.MAPROULETTE_API_KEY }}
          SECRET_MAILJET_APIKEY_PUBLIC: ${{ secrets.MAILJET_APIKEY_PUBLIC }}
          SECRET_MAILJET_APIKEY_PRIVATE: ${{ secrets.MAILJET_APIKEY_PRIVATE }}
          VAR_SKIP_DOWNLOAD: ${{ vars.SKIP_DOWNLOAD }}
          VAR_SKIP_UNCHANGED: ${{ vars.SKIP_UNCHANGED }}
          VAR_PROCESSING_DIFFING_MODE: ${{ vars.PROCESSING_DIFFING_MODE }}
          VAR_PROCESSING_DIFFING_BBOX: ${{ vars.PROCESSING_DIFFING_BBOX }}
          VAR_ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        run: |
          bun .github/scripts/generate-deploy-env.ts \
            --manifest .github/env/deploy.manifest.json \
            --output .env.deploy.generated

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: 'docker-compose.yml, docker-compose.network.yml, configs, psql_shell.sh, .env.deploy.generated'
          target: '/srv'
          overwrite: true

      - name: Stop & Start container on Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "Updating `.env`"
            cd /srv
            mv .env.deploy.generated .env
            chmod 644 .env
