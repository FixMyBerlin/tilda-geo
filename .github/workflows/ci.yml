name: Check PR

on: [pull_request]

jobs:
  validate-env-contract:
    name: Validate Env Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Verify deploy env manifest
        run: bun .github/scripts/verify-env-manifest.ts

      - name: Verify generated .github README
        run: |
          bun .github/scripts/generate-github-readme.ts
          git diff --exit-code -- .github/README.md

  run-app-ci:
    name: Run Type Check & Linters
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check types
        run: bun run type-check

      - name: Check linting
        run: bun run lint

      - name: Run tests
        env:
          # Vitest loads repo `/.env` when present; PR runners have none. These match local dev (see `.env.example`).
          VITE_APP_ENV: development
          VITE_APP_ORIGIN: http://127.0.0.1:5173
        run: bun run test-run
