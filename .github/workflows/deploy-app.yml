name: Deploy App to Ionos
on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        required: true
        type: string
      CONFIG_CHANGED:
        required: true
        type: boolean
      DIFF_CHECK_MODE:
        required: false
        type: string
        default: apply

permissions:
  contents: read

jobs:
  diff_app:
    uses: ./.github/workflows/diff-last-run.yml
    if: ${{ inputs.DIFF_CHECK_MODE == 'apply' }}
    with:
      CHECK_DIFF_LOCATIONS: app/ app.Dockerfile
  build_app:
    runs-on: ubuntu-latest
    needs: diff_app
    if: ${{ inputs.DIFF_CHECK_MODE == 'skip' || (inputs.DIFF_CHECK_MODE == 'apply' && needs.diff_app.outputs.changes == 'true') }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 'AWS: Configure credentials'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          file: ./app.Dockerfile
          context: ./
          push: true
          cache-from: |
            type=gha
            type=registry,ref=${{ vars.ECR_REGISTRY }}/tilda/app:${{ inputs.ENVIRONMENT }}-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ vars.ECR_REGISTRY }}/tilda/app:${{ inputs.ENVIRONMENT }}-cache,mode=max
          tags: |
            ${{ vars.ECR_REGISTRY }}/tilda/app:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/tilda/app:${{ inputs.ENVIRONMENT }}-latest
          build-args: |
            VITE_APP_ENV=${{ vars.VITE_APP_ENV }}
            VITE_APP_ORIGIN=${{ vars.VITE_APP_ORIGIN }}
  restart_app:
    runs-on: ubuntu-latest
    needs: [diff_app, build_app]
    if: ${{ inputs.DIFF_CHECK_MODE == 'skip' || (inputs.DIFF_CHECK_MODE == 'apply' && (needs.diff_app.outputs.changes == 'true' || inputs.CONFIG_CHANGED)) }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
      url: https://${{ vars.APP_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'AWS: Configure credentials'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Get ECR login password
        id: ecr-login
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region eu-central-1)
          echo "::add-mask::$ECR_PASSWORD"
          echo "password=$ECR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Stop & Start container on Server
        uses: appleboy/ssh-action@v1
        env:
          ECR_PASSWORD: ${{ steps.ecr-login.outputs.password }}
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ECR_PASSWORD,ECR_REGISTRY
          # Note on the "Cleanup docker"
          # There might be a race condition with the other github action as we are building app an processing in parallel
          # The 72h grace period should make sure nothing happend during the current build but old things get cleaned up
          script: |
            set -e
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            cd /srv
            echo "Pulling latest 'app' image"
            docker compose pull app
            echo "Restarting 'app' container"
            docker compose up app -d
            echo "Cleanup docker (containers and images) that are older than 72h"
            docker container prune -f --filter "until=72h"
            docker image prune -fa --filter "until=72h"
