name: Deploy Processing to Ionos

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        type: string
        required: true
      CONFIG_CHANGED:
        type: boolean
        required: true
      DIFF_CHECK_MODE:
        required: false
        type: string
        default: apply

permissions:
  contents: read

jobs:
  diff_processing:
    uses: ./.github/workflows/diff-last-run.yml
    if: ${{ inputs.DIFF_CHECK_MODE == 'apply' }}
    with:
      CHECK_DIFF_LOCATIONS: processing/ warm-cache/ processing.Dockerfile
  build_processing:
    runs-on: ubuntu-latest
    needs: diff_processing
    if: ${{ inputs.DIFF_CHECK_MODE == 'skip' || (inputs.DIFF_CHECK_MODE == 'apply' && needs.diff_processing.outputs.changes == 'true') }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: 'AWS: Configure credentials'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push processing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./processing.Dockerfile
          push: true
          cache-from: |
            type=gha
            type=registry,ref=${{ vars.ECR_REGISTRY }}/tilda/processing:${{ inputs.ENVIRONMENT }}-cache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ vars.ECR_REGISTRY }}/tilda/processing:${{ inputs.ENVIRONMENT }}-cache,mode=max
          tags: |
            ${{ vars.ECR_REGISTRY }}/tilda/processing:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/tilda/processing:${{ inputs.ENVIRONMENT }}-latest
  restart_processing:
    runs-on: ubuntu-latest
    needs: [diff_processing, build_processing]
    if: ${{ inputs.DIFF_CHECK_MODE == 'skip' || (inputs.DIFF_CHECK_MODE == 'apply' && (needs.diff_processing.outputs.changes == 'true' || inputs.CONFIG_CHANGED)) }}
    environment:
      name: ${{ inputs.ENVIRONMENT }}
      url: https://${{ vars.TILES_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: 'AWS: Configure credentials'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Get ECR login password
        id: ecr-login
        run: |
          ECR_PASSWORD=$(aws ecr get-login-password --region eu-central-1)
          echo "::add-mask::$ECR_PASSWORD"
          echo "password=$ECR_PASSWORD" >> $GITHUB_OUTPUT

      - name: Stop & Start containers on VPS
        uses: appleboy/ssh-action@v1
        env:
          ECR_PASSWORD: ${{ steps.ecr-login.outputs.password }}
          ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ECR_PASSWORD,ECR_REGISTRY
          # Note on the "Cleanup docker"
          # There might be a race condition with the other github action as we are building app an processing in parallel
          # The 72h grace period should make sure nothing happend during the current build but old things get cleaned up
          script: |
            set -e
            echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            cd /srv
            echo "Pulling latest 'processing' image"
            docker compose pull processing
            echo "Restarting 'processing' container"
            export PROCESSING_DIFFING_MODE="${{ vars.PROCESSING_DIFFING_MODE }}"
            docker compose up processing -d
            unset PROCESSING_DIFFING_MODE
            echo "Cleanup docker (containers and images) that are older than 72h"
            docker container prune -f --filter "until=72h"
            docker image prune -fa --filter "until=72h"
